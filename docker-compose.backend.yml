services:
  postgres:
    image: postgres:15-alpine
    container_name: samarthdesk_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - samarthdesk_network

  redis:
    image: redis:7-alpine
    container_name: samarthdesk_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - samarthdesk_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samarthdesk_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: v1
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://samarthdesk-ai.vercel.app}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_MODEL: ${AI_MODEL:-gpt-4-turbo-preview}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@samarthdesk.com}
      APP_NAME: ${APP_NAME:-Samarthdesk AI}
      APP_URL: ${APP_URL:-https://samarthdesk-ai.vercel.app}
      FRONTEND_URL: ${FRONTEND_URL:-https://samarthdesk-ai.vercel.app}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      - postgres
      - redis
    networks:
      - samarthdesk_network

volumes:
  postgres_data:

networks:
  samarthdesk_network:
    driver: bridge
