version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: samarthdesk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: samarthdesk
      POSTGRES_PASSWORD: samarthdesk_password
      POSTGRES_DB: samarthdesk_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - samarthdesk_network

  redis:
    image: redis:7-alpine
    container_name: samarthdesk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - samarthdesk_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: samarthdesk_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      API_VERSION: v1
      DATABASE_URL: postgresql://samarthdesk:samarthdesk_password@postgres:5432/samarthdesk_ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4-turbo-preview}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@samarthdesk.com}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      APP_NAME: Samarthdesk AI
      APP_URL: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - samarthdesk_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: samarthdesk_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - samarthdesk_network

volumes:
  postgres_data:

networks:
  samarthdesk_network:
    driver: bridge
